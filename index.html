<!DOCTYPE html>
<html>
<head>
<title>My Insta Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fafafa;
}

.header {
  background: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

.card img, .card video {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.like {
  color: red;
  cursor: pointer;
}

.comment-box {
  padding: 5px;
}

.comment-box input {
  width: 100%;
  padding: 6px;
  border: 1px solid #ddd;
}

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#popup img, #popup video {
  max-width: 90%;
  max-height: 90%;
}
</style>

</head>

<body>

<div class="header">My Gallery 📸🎥</div>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="closePopup()"></div>

<script>

// 🔥 UPDATED MEDIA (TUMHARE VIDEO ADD KIYE)
let media = [
  {type:"img", src:"IMG-20260325-WA0003.jpg"},
  {type:"img", src:"IMG-20260325-WA0007.jpg"},
  {type:"img", src:"IMG-20260325-WA0008.jpg"},
  {type:"img", src:"IMG-20260325-WA0010.jpg"},

  {type:"video", src:"video1.mp4"},
  {type:"video", src:"video2.mp4"},

  // ✅ NEW VIDEOS
  {type:"video", src:"VID_20260405_032449_956.mp4"},
  {type:"video", src:"VID_20260405_032525_010.mp4"}
];

let gallery = document.getElementById("gallery");

media.forEach((item) => {
  let card = document.createElement("div");
  card.className = "card";

  let mediaTag = "";

  if(item.type === "img"){
    mediaTag = `<img src="${item.src}" onclick="openPopup('img','${item.src}')">`;
  } else {
    mediaTag = `<video src="${item.src}" onclick="openPopup('video','${item.src}')"></video>`;
  }

  card.innerHTML = `
    ${mediaTag}

    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <span onclick="shareMedia('${item.src}')">🔗</span>
      <a href="${item.src}" download>💾</a>
    </div>

    <div class="comment-box">
      <input type="text" placeholder="Add comment..." onkeydown="addComment(event,this)">
      <div></div>
    </div>
  `;

  gallery.appendChild(card);
});

// Like
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

// Share
function shareMedia(src) {
  if (navigator.share) {
    navigator.share({ title: "Check this", url: src });
  } else {
    alert("Share not supported");
  }
}

// Popup open
function openPopup(type, src) {
  let popup = document.getElementById("popup");
  popup.style.display = "flex";

  if(type === "img"){
    popup.innerHTML = `<img src="${src}">`;
  } else {
    popup.innerHTML = `<video src="${src}" controls autoplay></video>`;
  }
}

// Close popup
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Comment
function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

</script>

</body>
</html>
