<!DOCTYPE html><html>
<head>
<title>My Website</title><style>
body {
  background-image: url("your-image.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

nav {
  background: black;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-size: 18px;
}

nav a:hover { color: yellow; }

h1 {
  color: yellow;
  text-align: center;
}

p { color: white; text-align: center; }

button {
  background-color: yellow;
  color: black;
  padding: 8px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.gallery {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.img-box {
  position: relative;
  width: 90%;
  max-width: 400px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s;
}

.img-box:hover .overlay { opacity: 1; }

.actions {
  display: flex;
  gap: 10px;
  margin-top: 5px;
}

.like { color: red; cursor: pointer; }

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#popup img {
  max-width: 100%;
  max-height: 100%;
}

.comment-box {
  width: 100%;
  margin-top: 5px;
}

.comment-box input {
  width: 70%;
  padding: 5px;
}

</style></head><body><nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav><h1>Welcome to my website 🎉</h1>
<p id="text">Ye meri first website hai</p>
<button onclick="changeText()">Click Me</button><div class="gallery">  <!-- IMAGE BOX -->  <div class="img-box">
    <img src="IMG-20260325-WA0003.jpg" onclick="openImage(this.src)">
    <div class="overlay">Image 1</div><div class="actions">
  <span class="like" onclick="like(this)">❤️ 0</span>
  <a href="IMG-20260325-WA0003.jpg" download>Save</a>
  <button onclick="shareImage('IMG-20260325-WA0003.jpg')">Share</button>
</div>

<div class="comment-box">
  <input type="text" placeholder="Comment..." onkeydown="addComment(event,this)">
  <div class="comments"></div>
</div>

  </div></div><div id="popup" onclick="closeImage()">
  <img id="popupImg">
</div><script>
function changeText() {
  document.getElementById("text").innerText = "Welcome 😎";
}

function shareImage(src) {
  if (navigator.share) {
    navigator.share({ title:'Check', url: src });
  } else {
    alert("Share not supported");
  }
}

function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}

// LIKE BUTTON
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

// COMMENT ADD
function addComment(e, input) {
  if (e.key === "Enter" && input.value.trim() !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}
</script></body>
  </html>
