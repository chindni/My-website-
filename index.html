<!DOCTYPE html>
<html>
<head>
<title>My App Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body { margin:0; font-family: Arial; }

/* LOGIN */
#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input, button {
  padding:10px;
  margin:5px;
  width:220px;
}

/* APP */
#app { display:none; padding:10px; }

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Profile */
.profile {
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* Gallery */
.gallery {
  column-count: 2;
}

.post {
  margin-bottom:10px;
}

.post img {
  width:100%;
  border-radius:10px;
}

/* Actions */
.actions {
  display:flex;
  justify-content:space-between;
}

.like {
  color:red;
  cursor:pointer;
}

/* Comment */
.comment-box input {
  width:100%;
  padding:5px;
}

/* Comment list */
.comments {
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Signup / Login</h2>
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="loginUser()">Login</button>
  <p id="error"></p>
</div>

<!-- APP -->
<div id="app">

<div class="topbar">
  <div class="profile">
    <img id="dp" src="https://via.placeholder.com/40">
    <span id="userName"></span>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<br>

<!-- Upload DP -->
<input type="file" onchange="uploadDP(event)">
<br><br>

<!-- Upload Post -->
<input type="file" onchange="uploadPost(event)">

<div class="gallery" id="gallery"></div>

</div>

<script>

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// Signup
function signup(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .then(res=>{
    db.collection("users").doc(res.user.uid).set({
      username: username.value,
      dp: ""
    });
  }).catch(e=>error.innerText=e.message);
}

// Login
function loginUser(){
  auth.signInWithEmailAndPassword(email.value, pass.value)
  .catch(e=>error.innerText="Wrong login");
}

// Logout
function logout(){
  auth.signOut();
}

// Upload DP
function uploadDP(e){
  let file = e.target.files[0];
  let ref = storage.ref("dp/"+auth.currentUser.uid);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("users").doc(auth.currentUser.uid).update({dp:url});
    });
  });
}

// Upload Post
function uploadPost(e){
  let file = e.target.files[0];
  let ref = storage.ref("posts/"+file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("posts").add({
        url: url,
        likes: 0,
        comments: []
      });
    });
  });
}

// Load Data
auth.onAuthStateChanged(user=>{
  if(user){
    login.style.display="none";
    app.style.display="block";

    db.collection("users").doc(user.uid).get().then(doc=>{
      userName.innerText = doc.data().username;
      if(doc.data().dp){
        dp.src = doc.data().dp;
      }
    });

    db.collection("posts").onSnapshot(snap=>{
      gallery.innerHTML="";

      snap.forEach(doc=>{
        let data = doc.data();

        let div = document.createElement("div");
        div.className="post";

        div.innerHTML = `
          <img src="${data.url}">
          
          <div class="actions">
            <span class="like" onclick="like('${doc.id}', this)">❤️ ${data.likes}</span>
          </div>

          <div class="comments">
            ${data.comments.map(c=>"<div>"+c+"</div>").join("")}
          </div>

          <div class="comment-box">
            <input placeholder="Comment..." 
            onkeydown="comment(event,'${doc.id}', this)">
          </div>
        `;

        gallery.appendChild(div);
      });
    });

  } else {
    login.style.display="flex";
    app.style.display="none";
  }
});

// Like
function like(id, el){
  let count = parseInt(el.innerText.split(" ")[1]) + 1;

  db.collection("posts").doc(id).update({
    likes: count
  });
}

// Comment
function comment(e,id,input){
  if(e.key==="Enter" && input.value){
    db.collection("posts").doc(id).get().then(doc=>{
      let arr = doc.data().comments || [];
      arr.push(input.value);

      db.collection("posts").doc(id).update({
        comments: arr
      });

      input.value="";
    });
  }
}

</script>

</body>
  </html>
