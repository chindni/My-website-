<!DOCTYPE html><html>
<head>
<title>Photo Gallery</title><style>
body {
  background: skyblue; /* sky blue background */
  font-family: Arial;
}

h1 {
  color: black;
  text-align: center;
}

.gallery {
  display: flex;
  justify-content: center; /* center me layega */
  gap: 15px;
  padding: 20px;
  flex-wrap: nowrap; /* ek hi line me rakhega */
  overflow-x: auto; /* zyada photo ho to scroll hoga */
}

.img-box {
  position: relative;
  min-width: 200px;
}

.img-box img {
  width: 200px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: 0.3s;
  border-radius: 10px;
  pointer-events: none;
}

.img-box:hover .overlay { opacity: 1; }

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.like { color: red; cursor: pointer; }

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#popup img {
  max-width: 100%;
  max-height: 100%;
}

</style></head><body><h1>My Photo Gallery 📸</h1><div class="gallery" id="gallery"></div><div id="popup" onclick="closeImage()">
  <img id="popupImg">
</div><script>

let images = [
  "IMG-20260325-WA0003.jpg",
  "IMG-20260325-WA0007.jpg",
  "IMG-20260325-WA0008.jpg",
  "IMG-20260325-WA0010.jpg",
"lv_0_20260219200139.jpg",
"Snapchat-1316453477.jpg",
"IMG_20260318_095656_509.jpg",
"Snapchat-1816127803.jpg
];

let gallery = document.getElementById("gallery");

images.forEach((src, index) => {
  let box = document.createElement("div");
  box.className = "img-box";

  box.innerHTML = `
    <img src="${src}" onclick="openImage('${src}')">
    <div class="overlay">Image ${index + 1}</div>

    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <a href="${src}" download>Save</a>
      <button onclick="shareImage('${src}')">Share</button>
    </div>
  `;

  gallery.appendChild(box);
});

function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

function shareImage(src) {
  if (navigator.share) {
    navigator.share({ title:'Check', url: src });
  } else {
    alert("Share not supported");
  }
}

function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}

</script></body>
</html>
