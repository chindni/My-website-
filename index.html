<!DOCTYPE html>
<html>

<head>
  
<title>My Website</title>

<style>

  .gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.gallery img {
  width: 30%;
  border-radius: 10px;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.1);
}
</style>



</head>

  <body>

<h1>Welcome to my website 🎉</h1>
<p>Ye meri first website hai</p>

<div class="gallery">
  <img src="IMG-20260325-WA0003.jpg" onclick="openImage(this.src)">
<img src="IMG-20260325-WA0007.jpg" onclick="openImage(this.src)">
<img src="IMG-20260325-WA0008.jpg" onclick="openImage(this.src)">
<img src="IMG-20260325-WA0010.jpg" onclick="openImage(this.src)">
</div>
<div id="popup" onclick="closeImage()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
  <img id="popupImg" style="width:90%; margin:5% auto; display:block;">
</div>

<script>
function openImage(src) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>
</body>

</html>
