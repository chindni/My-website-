<!DOCTYPE html>

<html>

<head>
  
<title>My Website</title>

<style>
display: flex;
  .gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.gallery img {
  width: 30%;
  border-radius: 10px;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.1);
}
  .gallery img:hover {
    transform: scale(1.1);
}

/* 👇 YAHAN PASTE KARO (line 26 ke baad) */

.gallery {
    display: flex;
    flex-direction: column;
    align-items: center;   /* 👉 center me laayega */
    gap: 20px;             /* thoda space */
}

.img-box {
    position: relative;
    width: 90%;   /* 👉 bada size (100% bhi kar sakte ho) */
    max-width: 400px;  /* 👉 control size */
  }

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
}
  .share-btn {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: white;
    color: black;
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s;
}

.img-box:hover .share-btn {
    opacity: 1;
}

.img-box:hover .overlay {
    opacity: 1;
  }
  nav {
  background: black;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  #popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#popup img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
  }
  font-size: 18px;
}

nav a:hover {
  color: yellow;
}
  body {
  background-image: url("your-image.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
   
  }
  h1 {
  color: yellow;
  font-size: 32px;
  text-align: center;
}

p {
  color: white;
  font-size: 18px;
  text-align: center;
  }
  
    .gallery img {
  width: 30%;
  border-radius: 10px;
  cursor: pointer;
      transition: 0.3s;
  }
  #text {
  text-shadow: 0 0 10px yellow, 0 0 20px orange;
  }
  button {
  background-color: yellow;
  color: black;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;

    transition: 0.3s;

  }
}
button:hover {
  background-color: orange;
  }  
</style>



</head>
  

  <body>
<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>
    

<h1>Welcome to my website 🎉</h1>
<p id="text">Ye meri first website hai</p>
    <button onclick="changeText()">Click Me</button>

<div class="gallery">

    <div class="img-box">
        <img src="IMG-20260325-WA0003.jpg" onclick="openImage(this.src)">
        <div class="overlay">Image 1</div>
      <a href="IMAGE-NAME.jpg" download class="save-btn">Save</a>
      <button class="share-btn" onclick="shareImage('IMG-20260325-WA0003.jpg')">Share</button>
    </div>

    <div class="img-box">
        <img src="IMG-20260325-WA0007.jpg" onclick="openImage(this.src)">
        <div class="overlay">Image 2</div>
      <a href="IMAGE-NAME.jpg" download class="save-btn">Save</a>
      <button class="share-btn" onclick="shareImage('IMG-20260325-WA0003.jpg')">Share</button>
    </div>

    <div class="img-box">
        <img src="IMG-20260325-WA0008.jpg" onclick="openImage(this.src)">
        <div class="overlay">Image 3</div>
      <a href="IMAGE-NAME.jpg" download class="save-btn">Save</a>
      <button class="share-btn" onclick="shareImage('IMG-20260325-WA0003.jpg')">Share</button>
    </div>

    <div class="img-box">
        <img src="IMG-20260325-WA0010.jpg" onclick="openImage(this.src)">
        <div class="overlay">Image 4</div>
      <a href="IMAGE-NAME.jpg" download class="save-btn">Save</a>
      <button class="share-btn" onclick="shareImage('IMG-20260325-WA0003.jpg')">Share</button>
    </div>

          </div>
    
<div id="popup" onclick="closeImage()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
  <img id="popupImg" style="width:90%; margin:5% auto; display:block;">
</div>

    <script>
function changeText() {
  let text = document.getElementById("text");
  let message = "Welcome to my website 😎";
  let i = 0;

  text.innerText = "";

  let interval = setInterval(() => {
    text.innerText += message[i];
    i++;
    if (i >= message.length) {
      clearInterval(interval);
    }
  }, 100);
}
      function shareImage(src) {
    if (navigator.share) {
        navigator.share({
            title: 'Check this image',
            text: 'Dekho ye photo!',
            url: src
        });
    } else {
        alert("Share supported nahi hai");
    }
      }
function openImage(src) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}
</script>
</body>

</html>
