<!DOCTYPE html>
<html>
<head>
<title>My Insta Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fafafa;
}

.header {
  background: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.filter {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

.filter button {
  padding: 8px 15px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

.filter button.active {
  background: black;
  color: white;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

.card img, .card video {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.like {
  color: red;
  cursor: pointer;
}

.comment-box input {
  width: 100%;
  padding: 6px;
  border: 1px solid #ddd;
}

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}
</style>

</head>

<body>

<div class="header">My Gallery 📸🎥</div>

<!-- ✅ FILTER BUTTON -->
<div class="filter">
  <button onclick="filterMedia('all')" class="active">All</button>
  <button onclick="filterMedia('img')">Photos</button>
  <button onclick="filterMedia('video')">Videos</button>
</div>

<div class="gallery" id="gallery"></div>
<div id="popup" onclick="closePopup()"></div>

<script>

// ✅ ALL MEDIA (tumhare sab photos add kiye)
let media = [

  // 🔥 PHOTOS
  {type:"img", src:"IMG-20251227-WA0004.jpg"},
  {type:"img", src:"IMG-20251226-WA0002.jpg"},
  {type:"img", src:"IMG_20251202_123902_970.jpg"},
  {type:"img", src:"IMG_20251202_123956_839.jpg"},
  {type:"img", src:"Snapchat-1698648041.jpg"},
  {type:"img", src:"IMG-20250717-WA0006.jpg"},
  {type:"img", src:"IMG-20250717-WA0023.jpg"},
  {type:"img", src:"IMG-20250717-WA0029.jpg"},
  {type:"img", src:"IMG-20250721-WA0004(1).jpg"},
  {type:"img", src:"IMG-20250721-WA0026.jpg"},
  {type:"img", src:"IMG-20250721-WA0028.jpg"},
  {type:"img", src:"IMG-20250721-WA0032.jpg"},
  {type:"img", src:"IMG-20250721-WA0036.jpg"},
  {type:"img", src:"IMG-20250721-WA0004.jpg"},
  {type:"img", src:"IMG-20250228-WA0002.jpg"},

  // 🎥 VIDEOS
  {type:"video", src:"video1.mp4"},
  {type:"video", src:"video2.mp4"},
  {type:"video", src:"VID_20260405_032449_956.mp4"},
  {type:"video", src:"VID_20260405_032525_010.mp4"}
];

let gallery = document.getElementById("gallery");

// ✅ SHOW MEDIA
function showMedia(type="all") {
  gallery.innerHTML = "";

  media.forEach((item) => {

    if(type !== "all" && item.type !== type) return;

    let card = document.createElement("div");
    card.className = "card";

    let mediaTag = item.type === "img"
      ? `<img src="${item.src}" onclick="openPopup('img','${item.src}')">`
      : `<video src="${item.src}" onclick="openPopup('video','${item.src}')"></video>`;

    card.innerHTML = `
      ${mediaTag}

      <div class="actions">
        <span class="like" onclick="like(this)">❤️ 0</span>
      </div>

      <div class="comment-box">
        <input type="text" placeholder="Add comment..." onkeydown="addComment(event,this)">
        <div></div>
      </div>
    `;

    gallery.appendChild(card);
  });
}

// ✅ FILTER FUNCTION
function filterMedia(type) {
  document.querySelectorAll(".filter button").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
  showMedia(type);
}

// Like
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  el.innerText = "❤️ " + (count + 1);
}

// Popup
function openPopup(type, src) {
  let popup = document.getElementById("popup");
  popup.style.display = "flex";

  popup.innerHTML = type === "img"
    ? `<img src="${src}">`
    : `<video src="${src}" controls autoplay></video>`;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// Comment
function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

// 🔥 DEFAULT LOAD
showMedia();

</script>

</body>
</html>
