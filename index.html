<!DOCTYPE html>
<html>
<head>
<title>My Insta Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fafafa;
}

.header {
  background: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

.card img, .card video {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
}

.actions {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.like {
  color: red;
  cursor: pointer;
}

.comment-box {
  padding: 5px;
}

.comment-box input {
  width: 100%;
  padding: 6px;
  border: 1px solid #ddd;
}

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#popup img, #popup video {
  max-width: 90%;
  max-height: 90%;
}
</style>

</head>

<body>

<div class="header">My Gallery 📸🎥</div>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="closePopup()"></div>

<script>

// ✅ FINAL MEDIA LIST (ALL FIXED)
let media = [
  // JPG IMAGES
  {type:"img", src:"IMG-20260325-WA0003.jpg"},
  {type:"img", src:"IMG-20260325-WA0007.jpg"},
  {type:"img", src:"IMG-20260325-WA0008.jpg"},
  {type:"img", src:"IMG-20260325-WA0010.jpg"},

  // JPEG IMAGES (NO (1)(2) ERROR)
  {type:"img", src:"b0ab30ef-4a70-49a9-8db3-26a9d1373d61.jpeg"},
  {type:"img", src:"b5dc81ae-fa46-4e6a-b496-620dec8c57e2.jpeg"},
  {type:"img", src:"645bdc3e-ed86-4d26-8cf7-93bf7b220dfaf.jpeg"},
  {type:"img", src:"93b344b-843e-440e-b9ef-123d67e992937.jpeg"},
  {type:"img", src:"5390d2c-4047-4291-85a4-6a5de725572b0.jpeg"},
  {type:"img", src:"4aaf214-597b-433c-8f85-82669eacd1278.jpeg"},
  {type:"img", src:"7849f90-107f-4992-aa84-9acf62ef275c1c.jpeg"},
  {type:"img", src:"afceca-e76f-482f-afd5-48165b23da48e15.jpeg"},
  {type:"img", src:"7dcb4-ea9b-47c1-b1e6-60edc7da2aa85b2.jpeg"},
  {type:"img", src:"6c0e9-7fe0-4b04-9fca-07edb1504e012a3c.jpeg"},
  {type:"img", src:"1dfc-e015-4dc0-953b-2b6d4060bf3dc392e.jpeg"},
  {type:"img", src:"24d-697c-46d8-ab53-2b4763df3159.jpeg"},

  // VIDEOS
  {type:"video", src:"video1.mp4"},
  {type:"video", src:"video2.mp4"},
  {type:"video", src:"VID_20260405_032449_956.mp4"},
  {type:"video", src:"VID_20260405_032525_010.mp4"}
];

let gallery = document.getElementById("gallery");

media.forEach((item) => {
  let card = document.createElement("div");
  card.className = "card";

  let mediaTag = "";

  if(item.type === "img"){
    mediaTag = `<img src="${item.src}" onclick="openPopup('img','${item.src}')">`;
  } else {
    mediaTag = `<video src="${item.src}" onclick="openPopup('video','${item.src}')"></video>`;
  }

  card.innerHTML = `
    ${mediaTag}
    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <span onclick="shareMedia('${item.src}')">🔗</span>
      <a href="${item.src}" download>💾</a>
    </div>
    <div class="comment-box">
      <input type="text" placeholder="Add comment..." onkeydown="addComment(event,this)">
      <div></div>
    </div>
  `;

  gallery.appendChild(card);
});

// ❤️ Like
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

// 🔗 Share
function shareMedia(src) {
  if (navigator.share) {
    navigator.share({ title: "Check this", url: src });
  } else {
    alert("Share not supported");
  }
}

// 🔍 Popup
function openPopup(type, src) {
  let popup = document.getElementById("popup");
  popup.style.display = "flex";

  if(type === "img"){
    popup.innerHTML = `<img src="${src}">`;
  } else {
    popup.innerHTML = `<video src="${src}" controls autoplay></video>`;
  }
}

// ❌ Close
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// 💬 Comment
function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

</script>

</body>
</html>
