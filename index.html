<!DOCTYPE html>
<html>
<head>
<title>My Instagram Style Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

/* Header */
.header {
  background: white;
  padding: 10px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

/* Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* Card */
.card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* Image */
.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  cursor: pointer;
}

/* Actions */
.actions {
  display: flex;
  justify-content: space-between;
  padding: 8px;
  font-size: 14px;
}

.like {
  color: red;
  cursor: pointer;
}

/* Comment */
.comment-box {
  padding: 5px;
}

.comment-box input {
  width: 100%;
  padding: 5px;
  border: 1px solid #ddd;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#popup img {
  max-width: 90%;
  max-height: 90%;
}
</style>

</head>

<body>

<div class="header">My Gallery 📸</div>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="closeImage()">
<img id="popupImg">
</div>

<script>

// 🔥 Photos yahan add karo
let images = [
  "IMG-20260325-WA0003.jpg",
  "IMG-20260325-WA0007.jpg",
  "IMG-20260325-WA0008.jpg",
  "IMG-20260325-WA0010.jpg",
  "lv_0_20260219200139.jpg",
  "Snapchat-1316453477.jpg",
  "IMG_20260318_095656_509.jpg",
  "Snapchat-1816127803.jpg"
];

let gallery = document.getElementById("gallery");

images.forEach((src) => {
  let card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${src}" onclick="openImage('${src}')">

    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <span onclick="shareImage('${src}')">🔗 Share</span>
      <a href="${src}" download>💾 Save</a>
    </div>

    <div class="comment-box">
      <input type="text" placeholder="Add a comment..." onkeydown="addComment(event,this)">
      <div></div>
    </div>
  `;

  gallery.appendChild(card);
});

// Like
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

// Share
function shareImage(src) {
  if (navigator.share) {
    navigator.share({ title: "Check this", url: src });
  } else {
    alert("Share not supported");
  }
}

// Fullscreen
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}

// Comment
function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

</script>

</body>
</html>
