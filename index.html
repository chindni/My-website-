<!DOCTYPE html>
<html>
<head>
<title>My App</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
}

/* 🔐 CENTER LOGIN */
#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

input, button {
  padding:10px;
  margin:5px;
  width:220px;
}

/* 📱 APP */
#app {
  display:none;
  padding:10px;
}

/* Gallery */
.gallery {
  column-count: 2;
}

img {
  width:100%;
  margin-bottom:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="loginUser()">Login</button>
</div>

<!-- APP -->
<div id="app">
  <button onclick="logout()">Logout</button>
  <input type="file" onchange="upload(event)">
  <div class="gallery" id="gallery"></div>
</div>

<script>

// 🔥 Firebase config yaha paste karo
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ✅ Signup FIX
function signup(){
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("pass").value
  ).then(()=>{
    alert("Account created");
  }).catch(e=>alert(e.message));
}

// ✅ Login FIX
function loginUser(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("pass").value
  ).catch(e=>alert(e.message));
}

// Logout
function logout(){
  auth.signOut();
}

// 📸 Upload
function upload(e){
  let file = e.target.files[0];
  let ref = storage.ref("images/" + file.name);

  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("photos").add({url});
    });
  });
}

// 🌄 Default Photos (auto show)
let defaultPhotos = [
  "https://picsum.photos/300/400?random=1",
  "https://picsum.photos/300/500?random=2",
  "https://picsum.photos/300/450?random=3",
  "https://picsum.photos/300/470?random=4",
  "https://picsum.photos/300/420?random=5",
  "https://picsum.photos/300/480?random=6",
  "https://picsum.photos/300/430?random=7",
  "https://picsum.photos/300/460?random=8"
];

// 🔄 Auth state
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    // 🟢 Default photos show
    gallery.innerHTML="";
    defaultPhotos.forEach(url=>{
      let img=document.createElement("img");
      img.src=url;
      gallery.appendChild(img);
    });

    // 🔥 Firebase photos bhi show
    db.collection("photos").onSnapshot(snap=>{
      snap.forEach(doc=>{
        let img=document.createElement("img");
        img.src=doc.data().url;
        gallery.appendChild(img);
      });
    });

  } else {
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

</script>

</body>
</html>
