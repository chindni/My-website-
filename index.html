<!DOCTYPE html>
<html>
<head>
<title>My Website</title>

<style>
body {
  background: white;
  font-family: Arial;
  margin: 0;
}

h1 {
  text-align: center;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 20px;
}

/* Box */
.img-box {
  text-align: center;
}

/* Image */
.img-box img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

/* Video */
.img-box video {
  width: 100%;
  height: 150px;
  border-radius: 10px;
}

/* Actions */
.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.like {
  color: red;
  cursor: pointer;
}

/* Comment */
.comment-box input {
  width: 100%;
  padding: 5px;
  margin-top: 5px;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#popup img {
  max-width: 100%;
  max-height: 100%;
}
</style>

</head>

<body>

<h1>My Photo & Video Gallery 📸🎥</h1>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="closeImage()">
<img id="popupImg">
</div>

<script>

// 📸 + 🎥 Media List
let media = [
  {type: "img", src: "IMG-20260325-WA0003.jpg"},
  {type: "img", src: "IMG-20260325-WA0007.jpg"},
  {type: "img", src: "IMG-20260325-WA0008.jpg"},
  {type: "img", src: "IMG-20260325-WA0010.jpg"},
  {type: "img", src: "lv_0_20260219200139.jpg"},
  {type: "img", src: "Snapchat-1316453477.jpg"},
  {type: "img", src: "IMG_20260318_095656_509.jpg"},
  {type: "img", src: "Snapchat-1816127803.jpg"},
  {type: "img", src: "20260512_081656.jpg"},
  {type: "img", src: "20260512_081707.jpg"},
  {type: "img", src: "20260512_081748.jpg"},
  {type: "img", src: "20260512_081750.jpg"},
  {type: "img", src: "20260512_081751.jpg"},

  // 🎥 VIDEO ADD
  {type: "video", src: "20260410_183240.mp4"}
 {type: "video", src: "lv_7613589243872414977_20260511201237.mp4"}
];

let gallery = document.getElementById("gallery");

media.forEach((item) => {
  let box = document.createElement("div");
  box.className = "img-box";

  box.innerHTML = `
    ${item.type === "img" 
      ? `<img src="${item.src}" onclick="openImage('${item.src}')">`
      : `<video src="${item.src}" controls></video>`
    }

    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <a href="${item.src}" download>Save</a>
      <button onclick="shareImage('${item.src}')">Share</button>
    </div>

    <div class="comment-box">
      <input type="text" placeholder="Comment..." onkeydown="addComment(event,this)">
      <div></div>
    </div>
  `;

  gallery.appendChild(box);
});

// ❤️ Like
function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

// 📤 Share
function shareImage(src) {
  if (navigator.share) {
    navigator.share({ title: "Check", url: src });
  } else {
    alert("Share not supported");
  }
}

// 🔍 Open Image
function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

// ❌ Close Image
function closeImage() {
  document.getElementById("popup").style.display = "none";
}

// 💬 Comment
function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

</script>

</body>
</html>
