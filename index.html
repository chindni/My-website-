<!DOCTYPE html>
<html>
<head>
<title>My Website</title>

<style>
body {
  background: white;
  font-family: Arial;
  margin: 0;
}

h1 {
  text-align: center;
}

/* ✅ GRID (2 line layout) */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 1 row me 4 photo */
  gap: 15px;
  padding: 20px;
}

/* Image box */
.img-box {
  text-align: center;
}

/* Image */
.img-box img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

/* Actions */
.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

.like {
  color: red;
  cursor: pointer;
}

/* Comment */
.comment-box input {
  width: 100%;
  padding: 5px;
  margin-top: 5px;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#popup img {
  max-width: 100%;
  max-height: 100%;
}
</style>

</head>

<body>

<h1>My Photo Gallery 📸</h1>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="closeImage()">
<img id="popupImg">
</div>

<script>

let images = [
  "IMG-20260325-WA0003.jpg",
  "IMG-20260325-WA0007.jpg",
  "IMG-20260325-WA0008.jpg",
  "IMG-20260325-WA0010.jpg",
  "lv_0_20260219200139.jpg",
  "Snapchat-1316453477.jpg",
  "IMG_20260318_095656_509.jpg",
  "Snapchat-1816127803.jpg"
];

let gallery = document.getElementById("gallery");

images.forEach((src) => {
  let box = document.createElement("div");
  box.className = "img-box";

  box.innerHTML = `
    <img src="${src}" onclick="openImage('${src}')">
    
    <div class="actions">
      <span class="like" onclick="like(this)">❤️ 0</span>
      <a href="${src}" download>Save</a>
      <button onclick="shareImage('${src}')">Share</button>
    </div>

    <div class="comment-box">
      <input type="text" placeholder="Comment..." onkeydown="addComment(event,this)">
      <div></div>
    </div>
  `;

  gallery.appendChild(box);
});

function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = "❤️ " + count;
}

function shareImage(src) {
  if (navigator.share) {
    navigator.share({ title: "Check", url: src });
  } else {
    alert("Share not supported");
  }
}

function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}

function addComment(e, input) {
  if (e.key === "Enter" && input.value !== "") {
    let div = document.createElement("div");
    div.innerText = input.value;
    input.nextElementSibling.appendChild(div);
    input.value = "";
  }
}

</script>

</body>
</html>
